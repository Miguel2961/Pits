<div class="login-wrapper">
  <div class="login-bg-grid"></div>

  <button type="button" class="theme-toggle-fixed" (click)="theme.toggleTheme()" [attr.aria-label]="theme.isDark() ? 'Usar tema claro' : 'Usar tema oscuro'">
    @if (theme.isDark()) {
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    } @else {
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    }
  </button>

  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="2" opacity="0.3"/>
          <circle cx="20" cy="20" r="8" fill="currentColor"/>
          <path d="M20 2 L20 10 M20 30 L20 38 M2 20 L10 20 M30 20 L38 20" stroke="currentColor" stroke-width="2"/>
        </svg>
      </div>
      <h1>PITS</h1>
      <p class="brand-tagline">Tu mecánico, a un pit stop</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      @if (error()) {
        <div class="error-banner">{{ error() }}</div>
      }

      <div class="field">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="tu@email.com"
          autocomplete="email"
        />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="********"
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span>
        } @else {
          Iniciar sesión
        }
      </button>
    </form>

    <p class="login-footer">
      ¿No tienes cuenta? <a routerLink="/registro">Regístrate</a>
    </p>
  </div>

  <div class="login-stripe"></div>
</div>
